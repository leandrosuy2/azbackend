services:
  postgres:
    image: postgres:15-alpine
    container_name: azchat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: azchat
      POSTGRES_PASSWORD: azchat123
      POSTGRES_DB: azchat
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U azchat -d azchat"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: azchat-redis
    restart: unless-stopped
    command: redis-server --requirepass azchat123 --port 6379
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "azchat123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
